<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Code Typing Practice</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --accent: #38bdf8;
      --correct: #22c55e;
      --wrong: #ef4444;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #020617, #0b1220);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 95%;
      max-width: 1100px;
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 26px;
      margin: 0;
      color: var(--accent);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    select, button {
      background: #020617;
      color: var(--text);
      border: 1px solid #1f2933;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 15px;
      cursor: pointer;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #020617;
      font-weight: 600;
      border: none;
    }

    button:hover { opacity: 0.9; }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .panel {
      background: #020617;
      border-radius: 14px;
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: var(--muted);
    }

    .code-box {
      font-family: Consolas, monospace;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 15px;
    }

    textarea {
      width: 100%;
      height: 300px;
      background: transparent;
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      font-family: Consolas, monospace;
      font-size: 15px;
      line-height: 1.5;
    }

    .correct { color: var(--correct); }
    .wrong { color: var(--wrong); text-decoration: underline; }

    .stats {
      margin-top: 16px;
      display: flex;
      justify-content: space-around;
      text-align: center;
      font-size: 16px;
    }

    .stat {
      background: #020617;
      padding: 10px 16px;
      border-radius: 12px;
      min-width: 120px;
    }

    .stat span {
      display: block;
      font-size: 22px;
      color: var(--accent);
      font-weight: bold;
    }

    footer {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      textarea { height: 220px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>⚡ Smart Code Typing</h1>
      <div class="controls">
        <select id="language" onchange="loadCode()">
          <option value="c">C</option>
          <option value="cpp">C++</option>
          <option value="python">Python</option>
          <option value="java">Java</option>
          <option value="js">JavaScript</option>
        </select>
        <button onclick="startTest()">Start</button>
      </div>
    </header>

    <div class="main">
      <div class="panel">
        <h2>Reference Code</h2>
        <div id="code" class="code-box"></div>
      </div>

      <div class="panel">
        <h2>Your Typing</h2>
        <textarea id="input" placeholder="Start typing here..." oninput="checkTyping()"></textarea>
      </div>
    </div>

    <div class="stats">
      <div class="stat">Speed<span id="speed">0</span>WPM</div>
      <div class="stat">Errors<span id="errors">0</span></div>
      <div class="stat">Time<span id="time">0</span>s</div>
    </div>

    <footer>
      Green = correct • Red underline = mistake → fix it
    </footer>
  </div>

  <script>
    const programs = {
      c: `#include <stdio.h>\nint main() {\n    int a = 5;\n    printf("%d", a);\n    return 0;\n}`,
      cpp: `#include <iostream>\nusing namespace std;\nint main() {\n    int a = 10;\n    cout << a;\n    return 0;\n}`,
      python: `def main():\n    a = 5\n    print(a)\n\nmain()` ,
      java: `public class Main {\n    public static void main(String[] args) {\n        int a = 5;\n        System.out.println(a);\n    }\n}` ,
      js: `let a = 5;\nconsole.log(a);`
    };

    let startTime = null;

    function loadCode() {
      const lang = language.value;
      code.innerText = programs[lang];
      input.value = "";
      startTime = null;
      speed.innerText = 0;
      errors.innerText = 0;
      time.innerText = 0;
    }

    function startTest() {
      startTime = new Date();
      input.value = "";
    }

    function checkTyping() {
      if (!startTime) return;

      const original = code.innerText;
      const typed = input.value;
      let html = "";
      let err = 0;

      for (let i = 0; i < original.length; i++) {
        if (typed[i] == null) {
          html += original[i];
        } else if (typed[i] === original[i]) {
          html += `<span class='correct'>${original[i]}</span>`;
        } else {
          html += `<span class='wrong'>${original[i]}</span>`;
          err++;
        }
      }

      code.innerHTML = html;
      errors.innerText = err;

      const seconds = Math.floor((new Date() - startTime) / 1000);
      time.innerText = seconds;

      const wpm = seconds > 0 ? Math.round((typed.length / 5) / (seconds / 60)) : 0;
      speed.innerText = wpm;
    }

    loadCode();
  </script>
</body>
</html>
